<article>
  <header>
    <h1>What's your name?</h1>
    <p>So everyone knows whose coffee is whose.</p>
  </header>
  <form hx-post="/me/name" hx-target="#app" hx-swap="innerHTML">
    <label>
      Display name or alias
      <input
        name="display_name"
        type="text"
        maxlength="40"
        minlength="1"
        autofocus
        required
        value="{{ submitted or '' }}"
        aria-invalid="{{ 'true' if error else '' }}"
        placeholder="e.g. Sam"
      />
      {% if error %}<small role="alert">{{ error }}</small>{% endif %}
    </label>
    <button type="submit">Save</button>
  </form>
</article>
