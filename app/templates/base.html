<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fff8f0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />

    <!-- Theme resolver — must run before first paint so a stored light/dark
         override never flashes the wrong theme. Stamps data-theme (resolved)
         and data-theme-pref (system|light|dark) on <html>; cycleTheme() is
         wired to the header toggle button. -->
    <script>
      (() => {
        const KEY = "theme";
        const mq = window.matchMedia("(prefers-color-scheme: dark)");
        const stored = () => {
          try { const v = localStorage.getItem(KEY); return v === "light" || v === "dark" ? v : null; }
          catch { return null; }
        };
        const apply = () => {
          const pref = stored();
          const theme = pref || (mq.matches ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
          document.documentElement.dataset.themePref = pref || "system";
          document.querySelectorAll('meta[name="theme-color"]').forEach((m) =>
            m.setAttribute("content", theme === "dark" ? "#000000" : "#fff8f0"));
        };
        mq.addEventListener("change", () => { if (!stored()) apply(); });
        window.cycleTheme = () => {
          const next = { system: "light", light: "dark", dark: "system" }[stored() || "system"];
          try { next === "system" ? localStorage.removeItem(KEY) : localStorage.setItem(KEY, next); }
          catch {}
          apply();
        };
        apply();
      })();
    </script>
    <title>{% block title %}{{ app_name }}{% endblock %}</title>

    <!-- Icons & PWA manifest -->
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/static/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Display type (self-hosted; preload the latin faces so they're ready
         at first paint and the wordmark/headings don't reflow) -->
    <link rel="preload" href="/static/vendor/shrikhand-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/static/vendor/fraunces-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/static/vendor/fraunces-italic-latin.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Vendored bundles — no external CDN (works on locked-down networks) -->
    <link rel="stylesheet" href="/static/vendor/pico.min.css" />
    <link rel="stylesheet" href="/static/coffee.css" />
    <script src="/static/vendor/htmx.min.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="brand">
        <img class="brand-mark" src="/static/brand-mark.svg" alt="" aria-hidden="true" width="48" height="48" />
        <div>
          {% set _name = app_name.split('@') %}
          <p class="brand-title">{{ _name[0] }}{% if _name|length > 1 %}<span class="brand-at">@</span><span class="brand-domain">{{ _name[1] }}</span>{% endif %}</p>
          <p class="brand-tagline">{{ tagline }}</p>
        </div>
        <button
          type="button"
          class="theme-toggle outline"
          onclick="cycleTheme()"
          aria-label="Colour theme: cycles system, light, dark"
        >
          {# Icons: Phosphor (phosphoricons.com, MIT) circle-half / sun / moon, fill weight #}
          <span class="theme-opt theme-opt-system"><svg viewBox="0 0 256 256" aria-hidden="true"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24ZM40,128a88.1,88.1,0,0,1,88-88V216A88.1,88.1,0,0,1,40,128Z"/></svg> Auto</span>
          <span class="theme-opt theme-opt-light"><svg viewBox="0 0 256 256" aria-hidden="true"><path d="M120,40V16a8,8,0,0,1,16,0V40a8,8,0,0,1-16,0Zm8,24a64,64,0,1,0,64,64A64.07,64.07,0,0,0,128,64ZM58.34,69.66A8,8,0,0,0,69.66,58.34l-16-16A8,8,0,0,0,42.34,53.66Zm0,116.68-16,16a8,8,0,0,0,11.32,11.32l16-16a8,8,0,0,0-11.32-11.32ZM192,72a8,8,0,0,0,5.66-2.34l16-16a8,8,0,0,0-11.32-11.32l-16,16A8,8,0,0,0,192,72Zm5.66,114.34a8,8,0,0,0-11.32,11.32l16,16a8,8,0,0,0,11.32-11.32ZM48,128a8,8,0,0,0-8-8H16a8,8,0,0,0,0,16H40A8,8,0,0,0,48,128Zm80,80a8,8,0,0,0-8,8v24a8,8,0,0,0,16,0V216A8,8,0,0,0,128,208Zm112-88H216a8,8,0,0,0,0,16h24a8,8,0,0,0,0-16Z"/></svg> Light</span>
          <span class="theme-opt theme-opt-dark"><svg viewBox="0 0 256 256" aria-hidden="true"><path d="M235.54,150.21a104.84,104.84,0,0,1-37,52.91A104,104,0,0,1,32,120,103.09,103.09,0,0,1,52.88,57.48a104.84,104.84,0,0,1,52.91-37,8,8,0,0,1,10,10,88.08,88.08,0,0,0,109.8,109.8,8,8,0,0,1,10,10Z"/></svg> Dark</span>
        </button>
      </header>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
