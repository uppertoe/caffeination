<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#231c07" />
    <title>{% block title %}{{ app_name }}{% endblock %}</title>

    <!-- Icons & PWA manifest -->
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/static/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Display type (self-hosted; preload the latin faces so they're ready
         at first paint and the wordmark/headings don't reflow) -->
    <link rel="preload" href="/static/vendor/fraunces-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/static/vendor/fraunces-italic-latin.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Vendored bundles — no external CDN (works on locked-down networks) -->
    <link rel="stylesheet" href="/static/vendor/pico.min.css" />
    <link rel="stylesheet" href="/static/coffee.css" />
    <script src="/static/vendor/htmx.min.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="brand">
        <img class="brand-mark" src="/static/brand-mark.svg" alt="" aria-hidden="true" width="48" height="48" />
        <div>
          {% set _name = app_name.split('@') %}
          <p class="brand-title">{{ _name[0] }}{% if _name|length > 1 %}<span class="brand-at">@</span><span class="brand-domain">{{ _name[1] }}</span>{% endif %}</p>
          <p class="brand-tagline">{{ tagline }}</p>
        </div>
      </header>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
