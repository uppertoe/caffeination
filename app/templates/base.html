<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#fff8f0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000" />

    <!-- Theme resolver — must run before first paint so a stored light/dark
         override never flashes the wrong theme. Stamps data-theme (resolved)
         and data-theme-pref (system|light|dark) on <html>; cycleTheme() is
         wired to the header toggle button. -->
    <script>
      (() => {
        const KEY = "theme";
        const mq = window.matchMedia("(prefers-color-scheme: dark)");
        const stored = () => {
          try { const v = localStorage.getItem(KEY); return v === "light" || v === "dark" ? v : null; }
          catch { return null; }
        };
        const apply = () => {
          const pref = stored();
          const theme = pref || (mq.matches ? "dark" : "light");
          document.documentElement.dataset.theme = theme;
          document.documentElement.dataset.themePref = pref || "system";
          document.querySelectorAll('meta[name="theme-color"]').forEach((m) =>
            m.setAttribute("content", theme === "dark" ? "#000000" : "#fff8f0"));
        };
        mq.addEventListener("change", () => { if (!stored()) apply(); });
        window.cycleTheme = () => {
          const next = { system: "light", light: "dark", dark: "system" }[stored() || "system"];
          try { next === "system" ? localStorage.removeItem(KEY) : localStorage.setItem(KEY, next); }
          catch {}
          apply();
        };
        apply();
      })();
    </script>
    <title>{% block title %}{{ app_name }}{% endblock %}</title>

    <!-- Icons & PWA manifest -->
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/static/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Display type (self-hosted; preload the latin faces so they're ready
         at first paint and the wordmark/headings don't reflow) -->
    <link rel="preload" href="/static/vendor/fraunces-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/static/vendor/fraunces-italic-latin.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Vendored bundles — no external CDN (works on locked-down networks) -->
    <link rel="stylesheet" href="/static/vendor/pico.min.css" />
    <link rel="stylesheet" href="/static/coffee.css" />
    <script src="/static/vendor/htmx.min.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="brand">
        <img class="brand-mark" src="/static/brand-mark.svg" alt="" aria-hidden="true" width="48" height="48" />
        <div>
          {% set _name = app_name.split('@') %}
          <p class="brand-title">{{ _name[0] }}{% if _name|length > 1 %}<span class="brand-at">@</span><span class="brand-domain">{{ _name[1] }}</span>{% endif %}</p>
          <p class="brand-tagline">{{ tagline }}</p>
        </div>
        <button
          type="button"
          class="theme-toggle outline"
          onclick="cycleTheme()"
          aria-label="Colour theme: cycles system, light, dark"
        >
          <span class="theme-opt theme-opt-system">&#9681; Auto</span>
          <span class="theme-opt theme-opt-light">&#9728; Light</span>
          <span class="theme-opt theme-opt-dark">&#9790; Dark</span>
        </button>
      </header>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
