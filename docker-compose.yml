services:
  web:
    build: .
    image: caffeine-rch:dev
    ports:
      - "8000:8000"
    environment:
      DEBUG: "true"
      SECRET_KEY: "dev-only-change-me"
      DATABASE_URL: "sqlite:////data/caffeine.db"
    volumes:
      - caffeine-data:/data
    restart: unless-stopped

volumes:
  caffeine-data:
