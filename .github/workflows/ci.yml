name: ci

on:
  push:
    branches: ['**']
  pull_request:
  schedule:
    # Weekly rebuild so base-image security fixes are picked up even when no
    # code changes; the digest pin on the server repo follows.
    - cron: "30 17 * * 0" # Sun 17:30 UTC (Mon 03:30 AEST)
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

  build-and-push:
    needs: test
    # Build on every branch push so each branch gets its own tag on GHCR.
    # PRs only run the test job — they don't push images.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tag rules:
          #   - :<branch>  for every branch push (e.g. :main, :live-build)
          #   - :latest    only on the default branch
          #   - :sha-<7>   every push, so a specific build is always pullable
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-


      # Build once and LOAD into the runner's docker: the image must boot and
      # serve /healthz before anything is pushed (unit tests can pass while
      # the packaged image is broken).
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: caffeination:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — image boots and serves /healthz
        run: |
          set -e
          docker run -d --name caffeination-smoke -p 8899:8000 -e SECRET_KEY=ci-dummy-secret -e DOMAIN=example.com -e DATABASE_URL=sqlite:////tmp/coffee.db caffeination:ci
          code=000
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8899/healthz || true)
            [ "$code" = "200" ] && break
            sleep 1
          done
          echo "GET /healthz -> $code (after ${i}s)"
          docker logs caffeination-smoke || true
          docker rm -f caffeination-smoke >/dev/null 2>&1 || true
          if [ "$code" != "200" ]; then
            echo "::error::boot smoke failed — image does not serve /healthz"
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
